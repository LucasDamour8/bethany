<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bethany Hotel & Resort - Unified Management System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --color-light-green: #009639;
            --color-light-green-hover: #007A2E;
            --color-light-gold: #D4AF37;
            --color-silver-light: #F4F6F4;
            --color-card-red: #DC2626;
            --color-card-red-hover: #B91C1C;
        }
        body {
            background-color: var(--color-silver-light);
        }
        .resort-bg-hero {
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.80)), url('beth.jpeg');
            background-size: cover;
            background-position: center;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-silver-light); }
        ::-webkit-scrollbar-thumb { background: var(--color-light-green); border-radius: 4px; }
    </style>
</head>
<body class="font-sans text-slate-800 antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/javascript">
        // ==========================================================
        // FIREBASE CONNECTIVITY INITIALIZATION NODES
        // ==========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB40MsTrGtGnMWSjQ_2eVqaqzoaF6Gr5o",
            authDomain: "bethany-19d3d.firebaseapp.com",
            projectId: "bethany-19d3d",
            storageBucket: "bethany-19d3d.firebasestorage.app",
            messagingSenderId: "313776681064",
            appId: "1:313776681064:web:d18b33751fcb0f1e04bdd",
            measurementId: "G-JGWED48SVY"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Categorized Menu Database Items matching your resort inventory mapping
        const MENU_ITEMS = [
            { id: "p1", name: "Chocolate Lava Cake", price: 6.00, image: "cake.jpg", category: "desert" },
            { id: "p2", name: "Gourmet Beef Burger", price: 12.00, image: "food.jpg", category: "food" },
            { id: "p3", name: "Belgian Waffles", price: 5.00, image: "waf.jpg", category: "desert" },
            { id: "p4", name: "Classic Tiramisu", price: 6.00, image: "tiramisu.jpg", category: "recipes" },
            { id: "p5", name: "Tropical Passion Juice", price: 4.50, image: "drinks.jpg", category: "drinks" },
            { id: "p6", name: "Iced Caramel Macchiato", price: 5.50, image: "drinks.jpg", category: "drinks" },
            { id: "p7", name: "Wood-Fired Pizza", price: 14.00, image: "food.jpg", category: "food" }
        ];

        const SYSTEM_MODULES = [
            { id: 'mod1', title: '1. Reservations & Bookings' },
            { id: 'mod2', title: '2. Front Office Control' },
            { id: 'mod3', title: '3. Room & Housekeeping (CRUD)' },
            { id: 'mod4', title: '4. Restaurant & Orders' },
            { id: 'mod5', title: '5. Inventory & Stocks (CRUD)' },
            { id: 'mod6', title: '6. Finance & Billing Balance' },
            { id: 'mod7', title: '7. HR & Access Logs' },
            { id: 'mod8', title: '8. Analytics Dashboard' },
            { id: 'mod9', title: '9. CRM & Feedback' }
        ];

        class bethanyHMS {
            constructor() {
                this.cart = [];
                this.currentView = 'welcome'; 
                this.staffRole = ''; 
                this.activeModuleTab = 'mod3'; // Defaults directly to newly interactive Housekeeping matrix
                this.liveOrders = [];
                this.selectedDetailedOrder = null;
                this.generatedOrderId = '';
                this.mobilePaymentNumber = '';
                this.guestNameInput = '';
                this.trackingOrderIdSearch = '';
                this.trackingOrderResult = null;
                this.selectedCategoryFilter = 'all'; 
                
                // Invoice splitting system variables
                this.splitCount = 2; 
                this.selectedBillingOrderId = null;

                // Live Client-Side Inventory Matrix Array state tracking CRUD operations
                this.inventoryItems = [
                    { id: 'inv1', name: 'Chocolate Cake Base Mix', qty: 45, unit: 'Boxes', minLevel: 15 },
                    { id: 'inv2', name: 'Artisan Coffee Beans', qty: 12, unit: 'KG', minLevel: 20 },
                    { id: 'inv3', name: 'Premium Beef Fatties', qty: 80, unit: 'Units', minLevel: 30 },
                    { id: 'inv4', name: 'Fresh Passion Fruit Extract', qty: 8, unit: 'Liters', minLevel: 10 }
                ];

                // Live Client-Side Housekeeping/Room List for dynamic CRUD operations
                this.housekeepingRooms = [
                    { id: 'rm101', number: '101', type: 'Deluxe Suite', status: 'Clean', staffAssigned: 'Alice Smith' },
                    { id: 'rm102', number: '102', type: 'Executive King', status: 'Dirty', staffAssigned: 'Bob Jones' },
                    { id: 'rm204', number: '204', type: 'Presidential Suite', status: 'Out of Order', staffAssigned: 'Charlie Brown' },
                    { id: 'rm305', number: '305', type: 'Standard Double', status: 'Clean', staffAssigned: 'None' }
                ];

                this.render();
                this.startLiveOrderListener();
            }

            setView(view) {
                this.currentView = view;
                this.render();
            }

            setCategoryFilter(category) {
                this.selectedCategoryFilter = category;
                this.render();
            }

            addToCart(itemId) {
                const product = MENU_ITEMS.find(item => item.id === itemId);
                if (!product) return;
                const existing = this.cart.find(item => item.product.id === itemId);
                if (existing) { existing.quantity++; } else { this.cart.push({ product, quantity: 1 }); }
                this.render();
            }

            adjustQty(itemId, amount) {
                const item = this.cart.find(i => i.product.id === itemId);
                if (!item) return;
                item.quantity += amount;
                if (item.quantity <= 0) this.cart = this.cart.filter(i => i.product.id !== itemId);
                this.render();
            }

            // ==========================================================
            // INVENTORY CRUD OPERATIONS CONTROLLERS
            // ==========================================================
            createInventoryItem(name, qty, unit, minLevel) {
                const newItem = {
                    id: 'inv_' + Date.now(),
                    name: name || 'Unnamed Supply Asset',
                    qty: parseInt(qty) || 0,
                    unit: unit || 'Units',
                    minLevel: parseInt(minLevel) || 10
                };
                this.inventoryItems.push(newItem);
                this.render();
            }

            updateInventoryQty(itemId, amount) {
                const item = this.inventoryItems.find(i => i.id === itemId);
                if (!item) return;
                item.qty += amount;
                if (item.qty < 0) item.qty = 0;
                this.render();
            }

            deleteInventoryItem(itemId) {
                this.inventoryItems = this.inventoryItems.filter(i => i.id !== itemId);
                this.render();
            }

            // ==========================================================
            // HOUSEKEEPING & ROOM CRUD OPERATIONS CONTROLLERS
            // ==========================================================
            createRoomEntry(number, type, status, staff) {
                const newRoom = {
                    id: 'rm_' + Date.now(),
                    number: number || 'N/A',
                    type: type || 'Standard Room',
                    status: status || 'Clean',
                    staffAssigned: staff || 'Unassigned'
                };
                this.housekeepingRooms.push(newRoom);
                this.render();
            }

            updateRoomStatus(roomId, newStatus) {
                const room = this.housekeepingRooms.find(r => r.id === roomId);
                if (!room) return;
                room.status = newStatus;
                this.render();
            }

            deleteRoomEntry(roomId) {
                this.housekeepingRooms = this.housekeepingRooms.filter(r => r.id !== roomId);
                this.render();
            }

            // ==========================================================
            // FIREBASE BACKEND AND ANALYTICS METRICS CONTROLLERS
            // ==========================================================
            startLiveOrderListener() {
                try {
                    db.collection("orders")
                        .orderBy("timestamp", "desc")
                        .onSnapshot((snapshot) => {
                            this.liveOrders = [];
                            snapshot.forEach((doc) => {
                                const data = doc.data();
                                this.liveOrders.push({
                                    id: doc.id,
                                    orderRefId: data.orderRefId || data.referenceId || "BETH-9831",
                                    guestName: data.guestName || "Valued Resident",
                                    room: data.room || "Suite 204",
                                    items: data.items || [],
                                    total: Number(data.total || 0),
                                    status: data.status || "PENDING EXECUTION",
                                    mobile: data.mobile || "N/A"
                                });
                            });
                            
                            if (this.currentView === 'track-progress' && this.trackingOrderIdSearch) {
                                const match = this.liveOrders.find(o => o.orderRefId.toLowerCase() === this.trackingOrderIdSearch.toLowerCase());
                                if (match) this.trackingOrderResult = match;
                            }
                            this.render();
                        });
                } catch(err) {
                    console.error("Database socket drop: ", err);
                }
            }

            // Helper to pull combined total of all cloud orders instantly
            getWholeTotalIncome() {
                return this.liveOrders.reduce((acc, current) => acc + (current.total || 0), 0);
            }

            async submitMPaymentTransaction(e) {
                e.preventDefault();
                const nameInput = document.getElementById('checkout-name-input').value.trim();
                const phoneInput = document.getElementById('checkout-mobile-input').value.trim();
                
                if (!nameInput || !phoneInput) { 
                    alert("Please complete identity forms fully."); 
                    return; 
                }
                
                this.guestNameInput = nameInput;
                this.mobilePaymentNumber = phoneInput;
                
                const btn = document.getElementById('btn-submit-checkout');
                if (btn) { 
                    btn.disabled = true; 
                    btn.innerText = "TRANSMITTING TO RESORT BACKEND..."; 
                }

                const txnId = "BETH-" + Math.floor(10000 + Math.random() * 90000);
                this.generatedOrderId = txnId;

                try {
                    await db.collection("orders").add({
                        orderRefId: txnId,
                        referenceId: txnId,
                        guestName: this.guestNameInput,
                        room: "Suite " + (Math.floor(Math.random() * 190) + 101),
                        mobile: this.mobilePaymentNumber,
                        items: this.cart.map(c => ({ name: c.product.name, qty: c.quantity })),
                        total: this.cart.reduce((t, c) => t + (c.product.price * c.quantity), 0),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        status: "PENDING EXECUTION"
                    });

                    this.cart = [];
                    this.setView('order-success');
                } catch(err) {
                    console.error(err);
                    alert("Local database execution link disconnected.");
                    if (btn) { btn.disabled = false; btn.innerText = "PROCEED TO VERIFY & SUBMIT"; }
                }
            }

            trackOrderSearch(e) {
                e.preventDefault();
                const idInput = document.getElementById('tracker-id-input').value.trim();
                if (!idInput) return;

                this.trackingOrderIdSearch = idInput;
                const match = this.liveOrders.find(o => o.orderRefId.toLowerCase() === idInput.toLowerCase());
                
                if (match) {
                    this.trackingOrderResult = match;
                } else {
                    this.trackingOrderResult = null;
                    alert("No matching record found.");
                }
                this.render();
            }

            async updateOrderStatus(orderId, newStatus) {
                try {
                    await db.collection("orders").doc(orderId).update({
                        status: newStatus
                    });
                    this.render();
                } catch(err) {
                    console.error(err);
                    alert("Pipeline state drop error.");
                }
            }

            render() {
                const root = document.getElementById('root');
                if (!root) return;

                if (this.currentView === 'welcome') root.innerHTML = this.viewWelcome();
                else if (this.currentView === 'menu') root.innerHTML = this.viewMenu();
                else if (this.currentView === 'payment') root.innerHTML = this.viewPayment();
                else if (this.currentView === 'order-success') root.innerHTML = this.viewOrderSuccess();
                else if (this.currentView === 'staff-login') root.innerHTML = this.viewStaffLogin();
                else if (this.currentView === 'staff-dashboard') root.innerHTML = this.viewStaffDashboard();
                else if (this.currentView === 'track-progress') root.innerHTML = this.viewTrackProgress();

                this.bindAllEvents();
            }

            viewWelcome() {
                return `
                    <div class="relative min-h-screen w-full flex items-center justify-center resort-bg-hero overflow-hidden">
                        <div class="absolute top-4 right-4 z-50 flex gap-2">
                            <button id="nav-track" class="bg-slate-900 text-[var(--color-light-gold)] border border-[var(--color-light-gold)] px-4 py-2.5 text-xs font-black rounded-lg hover:bg-black transition cursor-pointer uppercase tracking-wider">
                                🔎 Track Order Status
                            </button>
                            <button id="nav-login" class="bg-white/10 text-white border border-white/20 px-4 py-2.5 text-xs font-black rounded-lg hover:bg-zinc-800 transition cursor-pointer backdrop-blur-md uppercase tracking-wider">
                                🔐 Staff Workspace Login
                            </button>
                        </div>
                        <div class="relative w-11/12 max-w-md bg-white rounded-xl p-8 text-center shadow-2xl border-t-4 border-[var(--color-light-green)]">
                            <span class="tracking-widest text-[var(--color-light-gold)] font-black text-xs uppercase block mb-1">Luxury Resort Workspace</span>
                            <h1 class="text-3xl font-black text-slate-900 mb-6">KAIZEN HOTEL Management</h1>
                            <p class="text-xs text-stone-500 mb-6 font-medium leading-relaxed">Access room refreshment systems, monitor live housekeeping metrics with full CRUD tools, or configure billing reports instantly.</p>
                            <div class="space-y-3">
                                <button id="nav-menu" class="w-full py-4 bg-[var(--color-light-green)] text-white hover:bg-[var(--color-light-green-hover)] font-black rounded-lg transition text-xs uppercase tracking-wider cursor-pointer shadow-xs">
                                    🍇 Place Room Refreshment Order
                                </button>
                                <button id="nav-services-shortcut" class="w-full py-4 bg-white text-[var(--color-light-green)] border-2 border-[var(--color-light-green)] font-black rounded-lg text-xs uppercase tracking-wider transition hover:bg-stone-50 cursor-pointer">
                                    🏢 Access Internal Admin Terminals
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            viewMenu() {
                const total = this.cart.reduce((t, c) => t + (c.product.price * c.quantity), 0);
                const filteredItems = this.selectedCategoryFilter === 'all' 
                    ? MENU_ITEMS 
                    : MENU_ITEMS.filter(item => item.category === this.selectedCategoryFilter);

                return `
                    <header class="bg-white border-b border-stone-200 sticky top-0 z-50 px-8 py-4 flex justify-between items-center shadow-xs">
                        <h2 id="logo-home" class="text-lg font-black tracking-widest text-slate-900 cursor-pointer uppercase">B<span class="text-[var(--color-light-gold)]">ethany</span></h2>
                        <button id="menu-back" class="text-xs border border-stone-300 px-4 py-2 rounded-lg font-bold text-stone-600 hover:bg-stone-50 transition cursor-pointer">🏠 Return Home</button>
                    </header>

                    <main class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            
                            <div class="flex flex-wrap gap-2 pb-2 border-b border-stone-200">
                                <button data-filter-target="all" class="category-pill-btn px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition cursor-pointer ${this.selectedCategoryFilter === 'all' ? 'bg-[var(--color-light-green)] text-white shadow-sm' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-50'}" >🥞 All Items</button>
                                <button data-filter-target="drinks" class="category-pill-btn px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition cursor-pointer ${this.selectedCategoryFilter === 'drinks' ? 'bg-[var(--color-light-green)] text-white shadow-sm' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-50'}" >🍹 Drinks</button>
                                <button data-filter-target="food" class="category-pill-btn px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition cursor-pointer ${this.selectedCategoryFilter === 'food' ? 'bg-[var(--color-light-green)] text-white shadow-sm' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-50'}" >🍔 Food</button>
                                <button data-filter-target="recipes" class="category-pill-btn px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition cursor-pointer ${this.selectedCategoryFilter === 'recipes' ? 'bg-[var(--color-light-green)] text-white shadow-sm' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-50'}" >📖 Recipes</button>
                                <button data-filter-target="desert" class="category-pill-btn px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition cursor-pointer ${this.selectedCategoryFilter === 'desert' ? 'bg-[var(--color-light-green)] text-white shadow-sm' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-50'}" >🧁 Desert</button>
                            </div>

                            <h3 class="text-base font-black text-slate-900 flex items-center gap-2">
                                <span class="w-1.5 h-4 bg-[var(--color-light-green)] rounded-xs"></span> Menu Selections (${filteredItems.length})
                            </h3>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                ${filteredItems.map(item => `
                                    <div class="bg-white rounded-xl border border-stone-200 overflow-hidden shadow-xs flex flex-col justify-between hover:border-[var(--color-light-gold)] transition">
                                        <div class="h-48 w-full bg-stone-100 flex items-center justify-center font-bold text-stone-400 relative">
                                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentNode.innerHTML='[ ${item.name} Image Asset ]'">
                                            <span class="absolute top-2 right-2 bg-slate-900/80 backdrop-blur-xs text-white text-[9px] uppercase font-black px-2 py-0.5 rounded tracking-wider">${item.category}</span>
                                        </div>
                                        <div class="p-4 bg-white">
                                            <h4 class="font-black text-stone-900 text-sm">${item.name}</h4>
                                            <p class="text-xs font-black text-[var(--color-light-gold)] mt-1">$${item.price.toFixed(2)}</p>
                                            <button data-add-id="${item.id}" class="add-cart-btn w-full mt-4 bg-[var(--color-light-green)] text-white py-2.5 text-xs font-black rounded-lg hover:bg-[var(--color-light-green-hover)] transition cursor-pointer uppercase tracking-wider">
                                                + Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-white border border-stone-200 rounded-xl p-5 shadow-xs h-fit sticky top-24">
                            <div class="flex justify-between items-center border-b border-stone-100 pb-3 mb-4">
                                <h3 class="text-sm font-black text-slate-900">🛒 Selected Basket</h3>
                                <span class="text-[10px] bg-stone-100 text-stone-500 font-bold px-2 py-0.5 rounded">${this.cart.length} items</span>
                            </div>
                            ${this.cart.length === 0 ? `
                                <p class="text-stone-400 text-xs text-center py-16 font-medium">Basket is empty.</p>
                            ` : `
                                <div class="space-y-3 mb-4 max-h-64 overflow-y-auto pr-1">
                                    ${this.cart.map(c => `
                                        <div class="flex justify-between items-center text-xs border-b border-stone-100 pb-3 font-bold">
                                            <div>
                                                <p class="font-black text-stone-800">${c.product.name}</p>
                                                <p class="text-[11px] text-[var(--color-light-gold)] font-black">$${c.product.price.toFixed(2)}</p>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <button data-min-id="${c.product.id}" class="qty-min-btn bg-stone-100 w-5 h-5 flex items-center justify-center rounded font-bold cursor-pointer">-</button>
                                                <span class="font-black text-stone-800 w-4 text-center">${c.quantity}</span>
                                                <button data-plus-id="${c.product.id}" class="qty-plus-btn bg-stone-100 w-5 h-5 flex items-center justify-center rounded font-bold cursor-pointer">+</button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="border-t border-stone-100 pt-3 flex justify-between items-center mb-4">
                                    <span class="text-xs uppercase font-bold text-stone-500">Total Sum:</span>
                                    <span class="text-lg font-black text-slate-900">$${total.toFixed(2)}</span>
                                </div>
                                <button id="go-checkout" class="w-full bg-[var(--color-light-green)] text-white py-3.5 font-black rounded-lg hover:bg-[var(--color-light-green-hover)] transition cursor-pointer uppercase text-xs tracking-wider text-center block shadow-xs">
                                    Proceed to Checkout
                                </button>
                            `}
                        </div>
                    </main>
                `;
            }

            viewPayment() {
                const total = this.cart.reduce((t, c) => t + (c.product.price * c.quantity), 0);
                return `
                    <div class="min-h-screen w-full flex items-center justify-center px-4 py-10 bg-stone-100">
                        <div class="w-full max-w-md bg-white rounded-xl p-6 shadow-xl border border-[var(--color-light-gold)]">
                            <h2 class="text-base font-black text-slate-900 mb-1 flex items-center gap-2">📱 Guest Checkout Clearance</h2>
                            <p class="text-xs text-stone-400 mb-6 font-medium">Provide details to submit your hotel transaction.</p>
                            
                            <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 mb-6">
                                <span class="text-[10px] font-black text-stone-400 uppercase block tracking-wider">TOTAL DUE BALANCE</span>
                                <span class="text-2xl font-black text-[var(--color-light-green)] mt-0.5 block">$${total.toFixed(2)}</span>
                            </div>

                            <form id="checkout-payment-form" class="space-y-4">
                                <div>
                                    <label class="block text-[10px] font-black text-stone-600 uppercase mb-1.5 tracking-wider">Guest Full Name:</label>
                                    <input id="checkout-name-input" type="text" required placeholder="e.g. Jane Doe" class="w-full border border-stone-200 p-3 rounded-lg text-xs bg-white font-bold focus:outline-none focus:border-[var(--color-light-green)] transition shadow-inner">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-stone-600 uppercase mb-1.5 tracking-wider">Mobile Phone Contact Line:</label>
                                    <input id="checkout-mobile-input" type="text" required placeholder="e.g. 0788000000" class="w-full border border-stone-200 p-3 rounded-lg text-xs bg-white font-bold focus:outline-none focus:border-[var(--color-light-green)] transition shadow-inner">
                                </div>
                                
                                <div class="pt-4">
                                    <button type="submit" id="btn-submit-checkout" class="w-full bg-[var(--color-card-red)] text-white py-3.5 rounded-lg font-black text-xs hover:bg-[var(--color-card-red-hover)] transition uppercase tracking-widest cursor-pointer shadow-md">
                                        SUBMIT ORDER TO FIRESTONE
                                    </button>
                                </div>
                            </form>
                            <button id="pay-cancel" class="w-full text-stone-400 text-xs mt-4 hover:underline text-center block font-black">Return to Menu</button>
                        </div>
                    </div>
                `;
            }

            viewOrderSuccess() {
                return `
                    <div class="min-h-screen w-full flex items-center justify-center px-4 bg-stone-100">
                        <div class="w-full max-w-md bg-white rounded-xl p-6 text-center border-2 border-[var(--color-light-green)] shadow-2xl">
                            <div class="w-12 h-12 bg-emerald-50 text-[var(--color-light-green)] rounded-full flex items-center justify-center text-xl mx-auto mb-4 border border-[var(--color-light-green)] font-black">✓</div>
                            <h2 class="text-lg font-black text-slate-900">Order Dispatched!</h2>
                            <p class="text-xs text-stone-400 mt-1 mb-6 font-medium">Your tracking code has been dispatched into the active workstation modules pool loop.</p>
                            
                            <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 mb-4 text-left">
                                <span class="text-[10px] font-black uppercase text-stone-400 tracking-wider block">Generated Reference Tracking Code ID</span>

                                                        <div class="flex items-center gap-2 text-[11px]">
                                                            <span class="text-stone-400">Floor Warning Minimum: ${item.minLevel} ${item.unit}</span>
                                                            ${isLow ? `<span class="bg-rose-100 text-rose-800 text-[9px] px-1.5 py-0.5 rounded font-black uppercase tracking-wide">⚠ LOW STOCK RUNNING OUT</span>` : `<span class="bg-emerald-100 text-emerald-800 text-[9px] px-1.5 py-0.5 rounded font-black uppercase tracking-wide">✔ Secure</span>`}
                                                        </div>
                                                    </div>

                                                    <div class="flex items-center gap-4 justify-between sm:justify-end">
                                                        <div class="flex items-center gap-2 bg-stone-100 p-1.5 rounded border border-stone-200">
                                                            <button data-inv-dec-id="${item.id}" class="btn-inv-minus bg-white w-6 h-6 flex items-center justify-center rounded border border-stone-300 hover:bg-stone-50 shadow-2xs font-black cursor-pointer text-stone-600">-</button>
                                                            <span class="w-16 text-center font-mono font-black text-sm text-slate-800">${item.qty} <span class="text-[10px] text-stone-500 font-sans font-normal">${item.unit}</span></span>
                                                            <button data-inv-inc-id="${item.id}" class="btn-inv-plus bg-white w-6 h-6 flex items-center justify-center rounded border border-stone-300 hover:bg-stone-50 shadow-2xs font-black cursor-pointer text-stone-600">+</button>
                                                        </div>

                                                        <button data-inv-del-id="${item.id}" class="btn-inv-delete text-[var(--color-card-red)] hover:text-red-800 transition font-black tracking-wider uppercase text-[11px] border border-red-200 hover:bg-red-50 px-2.5 py-1.5 rounded-lg cursor-pointer">
                                                            🗑 Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                        ${this.inventoryItems.length === 0 ? `<div class="p-12 text-center text-stone-400 italic">No supply items mapped inside the dynamic system logs. Add one above.</div>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    case 'mod6':
                        // ==========================================================
                        // MODULE 6: FINANCE & BILLING — SHOWING WHOLE TOTAL INCOME
                        // ==========================================================
                        return `
                            <h2 class="text-sm font-black text-slate-900 mb-1">6. Finance & Billing Master Audit Sheets</h2>
                            <p class="text-xs text-stone-400 mb-4 font-medium">Aggregated real-time summary of profit margins and financial processing pipelines.</p>
                            
                            <div class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white rounded-xl p-6 shadow-md border-b-4 border-[var(--color-light-gold)] flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                                <div>
                                    <span class="text-[10px] tracking-widest font-black uppercase text-emerald-100 block">Total Combined Gross System Income</span>
                                    <h3 class="text-3xl font-black mt-1 tracking-wide">$${this.getWholeTotalIncome().toFixed(2)}</h3>
                                </div>
                                <div class="bg-white/10 px-4 py-2 rounded-lg text-xs font-mono font-bold border border-white/20">
                                    Parsed Logs: ${this.liveOrders.length} Invoices
                                </div>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                                <div class="border border-stone-200 rounded-xl bg-white p-4 shadow-xs">
                                    <p class="text-[10px] font-black uppercase text-stone-400 tracking-wider mb-2">Select Target Voucher Row to Split</p>
                                    <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
                                        ${this.liveOrders.map(ord => `
                                            <div data-billing-select-id="${ord.id}" class="billing-row-selector cursor-pointer border p-3 rounded-lg flex justify-between items-center font-bold text-xs transition ${this.selectedBillingOrderId === ord.id ? 'border-[var(--color-light-green)] bg-emerald-50/40' : 'border-stone-200 hover:bg-stone-50'}">
                                                <div>
                                                    <span class="font-mono text-[var(--color-card-red)] block">${ord.orderRefId}</span>
                                                    <span class="text-slate-600 text-[11px]">${ord.guestName}</span>
                                                </div>
                                                <span class="text-slate-900 font-black">$${ord.total.toFixed(2)}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <div class="bg-stone-50 border border-stone-200 rounded-xl p-4 shadow-xs">
                                    <h3 class="text-xs font-black text-slate-900 uppercase border-b border-stone-200 pb-2 mb-3">🧮 Invoice Division Engine</h3>
                                    ${!targetBillingOrder ? `
                                        <p class="text-xs text-stone-400 font-medium py-6 text-center italic">Select an available record row on the left side menu to initialize the calculation matrix.</p>
                                    ` : `
                                        <div class="space-y-4 text-xs font-bold">
                                            <div class="flex justify-between items-center">
                                                <span class="text-stone-500">Parent Ticket Total:</span>
                                                <span class="text-sm font-black text-slate-900">$${targetBillingOrder.total.toFixed(2)}</span>
                                            </div>
                                            
                                            <div>
                                                <label class="block text-[10px] uppercase text-stone-400 font-black mb-1.5">Divide Evenly Into:</label>
                                                <select id="select-split-factor" class="w-full bg-white border border-stone-300 p-2 rounded text-xs font-black">
                                                    <option value="2" ${this.splitCount == 2 ? 'selected' : ''}>2 Separate Guest Receipts</option>
                                                    <option value="3" ${this.splitCount == 3 ? 'selected' : ''}>3 Separate Guest Receipts</option>
                                                    <option value="4" ${this.splitCount == 4 ? 'selected' : ''}>4 Separate Guest Receipts</option>
                                                </select>
                                            </div>

                                            <div class="bg-white border border-stone-200 rounded-lg p-3 space-y-2">
                                                <p class="text-[10px] text-stone-400 uppercase tracking-wider font-black">Calculated Breakdown Result Matrix:</p>
                                                <div class="space-y-1 max-h-40 overflow-y-auto">
                                                    ${Array.from({length: this.splitCount}).map((_, idx) => `
                                                        <div class="flex justify-between text-[11px] bg-stone-50 p-2 rounded border border-stone-100">
                                                            <span class="text-stone-600 font-mono">Receipt Token Part #${idx + 1}</span>
                                                            <span class="text-[var(--color-light-green)] font-black">$${(targetBillingOrder.total / this.splitCount).toFixed(2)}</span>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>

                                            <button onclick="alert('Split balance confirmed and posted to PMS billing master ledger sheets successfully.');" class="w-full bg-[var(--color-light-green)] text-white font-black uppercase text-xs py-2.5 rounded-lg hover:bg-[var(--color-light-green-hover)] transition cursor-pointer text-center">
                                                Confirm Split & Issue Invoices
                                            </button>
                                        </div>
                                    `}
                                </div>
                            </div>
                        `;
                    case 'mod7':
                        return `
                            <h2 class="text-sm font-black text-slate-900 mb-1">7. HR & Employee Access Matrix Logger</h2>
                            <p class="text-xs text-stone-400 mb-4 font-medium">Review current internal workspace employee shift tracking metrics.</p>
                            <div class="p-3 bg-stone-100 border rounded-lg font-mono text-[11px] text-stone-600 space-y-1">
                                <p>[08:30 AM] - Operational session node connected securely.</p>
                                <p>[11:15 AM] - Active supervisor instance authorization token cleared.</p>
                            </div>
                        `;
                    case 'mod8':
                        return `
                            <h2 class="text-sm font-black text-slate-900 mb-1">8. Performance Metrics Analytics Dashboard</h2>
                            <p class="text-xs text-stone-400 mb-4 font-medium">Occupancy statistics calculations and property resource deployment indices.</p>
                            <div class="bg-slate-900 text-[var(--color-light-gold)] p-6 rounded-xl font-mono text-center text-xs tracking-widest uppercase font-black">
                                📊 [ Live Graphics Rendering Stream Active ]
                            </div>
                        `;
                    case 'mod9':
                        return `
                            <h2 class="text-sm font-black text-slate-900 mb-1">9. CRM Guest Retention & Feedback Matrix</h2>
                            <p class="text-xs text-stone-400 mb-4 font-medium">Hospitality satisfaction tracking and net promoter score logging indices.</p>
                            <div class="p-4 bg-emerald-50 text-[var(--color-light-green)] border border-emerald-100 rounded-lg text-xs font-bold">
                                Property Net Promoter Score metric sits at 98.4% satisfaction index calibration.
                            </div>
                        `;
                    default: return '';
                }
            }

            bindAllEvents() {
                document.getElementById('nav-menu')?.addEventListener('click', () => this.setView('menu'));
                document.getElementById('nav-login')?.addEventListener('click', () => this.setView('staff-login'));
                document.getElementById('nav-track')?.addEventListener('click', () => this.setView('track-progress'));
                document.getElementById('nav-services-shortcut')?.addEventListener('click', () => this.setView('staff-login'));
                
                document.getElementById('btn-tracker-home')?.addEventListener('click', () => { 
                    this.trackingOrderIdSearch = ''; 
                    this.trackingOrderResult = null; 
                    this.setView('welcome'); 
                });
                document.getElementById('form-order-tracker')?.addEventListener('submit', (e) => this.trackOrderSearch(e));
                
                document.getElementById('menu-back')?.addEventListener('click', () => this.setView('welcome'));
                document.getElementById('logo-home')?.addEventListener('click', () => this.setView('welcome'));
                document.getElementById('go-checkout')?.addEventListener('click', () => this.setView('payment'));
                document.getElementById('pay-cancel')?.addEventListener('click', () => this.setView('menu'));
                document.getElementById('checkout-payment-form')?.addEventListener('submit', (e) => this.submitMPaymentTransaction(e));
                document.getElementById('btn-success-home')?.addEventListener('click', () => this.setView('welcome'));
                document.getElementById('staff-login-cancel')?.addEventListener('click', () => this.setView('welcome'));
                document.getElementById('btn-staff-login')?.addEventListener('click', () => this.handleStaffLogin());
                
                // Re-routed disconnect logic to explicitly fire full application component resets
                document.getElementById('btn-staff-logout')?.addEventListener('click', () => { 
                    this.staffRole = ''; 
                    this.setView('welcome'); 
                });

                document.querySelectorAll('.category-pill-btn').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const targetFilter = e.currentTarget.getAttribute('data-filter-target');
                        this.setCategoryFilter(targetFilter);
                    });
                });

                document.querySelectorAll('.add-cart-btn').forEach(b => {
                    b.addEventListener('click', (e) => this.addToCart(e.currentTarget.getAttribute('data-add-id')));
                });
                document.querySelectorAll('.qty-plus-btn').forEach(b => {
                    b.addEventListener('click', (e) => this.adjustQty(e.currentTarget.getAttribute('data-plus-id'), 1));
                });
                document.querySelectorAll('.qty-min-btn').forEach(b => {
                    b.addEventListener('click', (e) => this.adjustQty(e.currentTarget.getAttribute('data-min-id'), -1));
                });
                
                document.querySelectorAll('.sidebar-tab-btn').forEach(b => {
                    b.addEventListener('click', (e) => {
                        this.activeModuleTab = e.currentTarget.getAttribute('data-module-tab');
                        this.render();
                    });
                });
                
                document.querySelectorAll('.inspect-row-btn').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const targetId = e.currentTarget.getAttribute('data-inspect-order-id');
                        this.selectedDetailedOrder = this.liveOrders.find(o => o.id === targetId) || null;
                        this.render();
                    });
                });
                
                document.getElementById('btn-close-inspect')?.addEventListener('click', () => {
                    this.selectedDetailedOrder = null;
                    this.render();
                });

                document.querySelector('.btn-guest-mark-received')?.addEventListener('click', (e) => {
                    const targetDocId = e.currentTarget.getAttribute('data-complete-target-id');
                    this.updateOrderStatus(targetDocId, 'RECEIVED & COMPLETED');
                });

                document.querySelectorAll('.btn-change-status').forEach(b => {
                    b.addEventListener('click', (e) => {
                        if (!this.selectedDetailedOrder) return;
                        const routeStatus = e.currentTarget.getAttribute('data-status-route');
                        this.updateOrderStatus(this.selectedDetailedOrder.id, routeStatus);
                    });
                });

                document.querySelectorAll('.billing-row-selector').forEach(b => {
                    b.addEventListener('click', (e) => {
                        this.selectedBillingOrderId = e.currentTarget.getAttribute('data-billing-select-id');
                        this.render();
                    });
                });

                document.getElementById('select-split-factor')?.addEventListener('change', (e) => {
                    this.splitCount = parseInt(e.target.value);
                    this.render();
                });

                // ==========================================================
                // BIND DYNAMIC INVENTORY INTERACTION DOM LISTENERS
                // ==========================================================
                document.getElementById('form-create-inventory')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('inv-input-name').value.trim();
                    const qty = document.getElementById('inv-input-qty').value;
                    const unit = document.getElementById('inv-input-unit').value.trim();
                    const min = document.getElementById('inv-input-min').value;
                    
                    this.createInventoryItem(name, qty, unit, min);
                });

                document.querySelectorAll('.btn-inv-plus').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-inv-inc-id');
                        this.updateInventoryQty(id, 1);
                    });
                });

                document.querySelectorAll('.btn-inv-minus').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-inv-dec-id');
                        this.updateInventoryQty(id, -1);
                    });
                });

                document.querySelectorAll('.btn-inv-delete').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-inv-del-id');
                        if(confirm('Are you sure you want to remove this item from the warehouse tracking sheets?')) {
                            this.deleteInventoryItem(id);
                        }
                    });
                });

                // ==========================================================
                // BIND DYNAMIC HOUSEKEEPING INTERACTION DOM LISTENERS
                // ==========================================================
                document.getElementById('form-create-room')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const num = document.getElementById('room-input-number').value.trim();
                    const typ = document.getElementById('room-input-type').value.trim();
                    const sts = document.getElementById('room-input-status').value;
                    const stf = document.getElementById('room-input-staff').value.trim();

                    this.createRoomEntry(num, typ, sts, stf);
                });

                document.querySelectorAll('.room-status-dropdown').forEach(s => {
                    s.addEventListener('change', (e) => {
                        const id = e.currentTarget.getAttribute('data-room-select-id');
                        const nextValue = e.target.value;
                        this.updateRoomStatus(id, nextValue);
                    });
                });

                document.querySelectorAll('.btn-room-delete').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-room-del-id');
                        if(confirm('Permanently wipe this suite entry out of your resort facility listing logs?')) {
                            this.deleteRoomEntry(id);
                        }
                    });
                });
            }

            handleStaffLogin() {
                const val = document.getElementById('staff-role-input').value.trim();
                if (!val) { alert("Please supply role title."); return; }
                this.staffRole = val;
                this.setView('staff-dashboard');
            }
        }

        window.addEventListener('DOMContentLoaded', () => { new bethanyHMS(); });
    </script>
</body>
</html>
